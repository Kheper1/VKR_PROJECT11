services:
  mysql-center:
    image: mysql:8.0
    container_name: diplom-mysql-center
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: center_db
      MYSQL_USER: diplom
      MYSQL_PASSWORD: diplom
    ports:
      - "3307:3306"
    volumes:
      - center_data:/var/lib/mysql
      - ./init/center-init.sql:/docker-entrypoint-initdb.d/center-init.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  mysql-branch-1:
    image: mysql:8.0
    container_name: diplom-mysql-branch-1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
