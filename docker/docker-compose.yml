      MYSQL_DATABASE: branch2_db
      MYSQL_USER: diplom
      MYSQL_PASSWORD: diplom
    ports:
      - "3309:3306"
    volumes:
      - branch2_data:/var/lib/mysql
      - ./init/branch2-init.sql:/docker-entrypoint-initdb.d/branch2-init.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  mysql-branch-3:
    image: mysql:8.0
    container_name: diplom-mysql-branch-3
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: branch3_db
      MYSQL_USER: diplom
      MYSQL_PASSWORD: diplom
    ports:
      - "3310:3306"
    volumes:
      - branch3_data:/var/lib/mysql
      - ./init/branch3-init.sql:/docker-entrypoint-initdb.d/branch3-init.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  center_data:
  branch1_data:
  branch2_data:
  branch3_data:
